name: Docker Build on Main Merge

on:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required for ghcr.io push
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/eventify:latest .

      - name: Push Docker image (latest)
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/eventify:latest

# No extra secrets are needed for GHCR when using GITHUB_TOKEN.
# The image will appear at: ghcr.io/<owner>/eventify:latest
# To pull: docker pull ghcr.io/<owner>/eventify:latest
