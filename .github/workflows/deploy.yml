name: Deploy to EC2 on Push

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Create SSH key file
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_PEM_KEY }}" > ~/.ssh/eventify.pem
          chmod 600 ~/.ssh/eventify.pem

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/eventify.pem -o StrictHostKeyChecking=no ubuntu@ec2-52-66-242-74.ap-south-1.compute.amazonaws.com << 'EOF'
            cd /home/ubuntu/eventify
            git pull origin main
            npm install
            npm run build
            if pm2 list | grep -q 'eventify'; then
              pm2 restart eventify
            else
              pm2 start npm --name "eventify" -- start
            fi
            pm2 save
          EOF
