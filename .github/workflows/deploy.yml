name: Deploy to EC2 on Push

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the Repository
      - name: Checkout Repository
        uses: actions/checkout@v2

      # Step 2: Set up SSH
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Step 3: Test SSH Connection (Debugging Step)
      - name: Test SSH Connection
        run: ssh -o StrictHostKeyChecking=no ubuntu@13.232.47.245 echo "SSH connection successful"

      # Step 4: Deploy to EC2
      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@13.232.47.245 << 'EOF'
            # Navigate to your project directory
            cd /home/ubuntu/eventify

            # Pull the latest changes from the main branch
            git pull origin main

            # Remove lock files to ensure fresh install
            rm -f bun.lockb package-lock.json yarn.lock pnpm-lock.yaml

            # Install dependencies
            npm install --legacy-peer-deps

            # Build the project (if applicable)
            npm run build

            # Start or restart the application using PM2
            if pm2 list | grep -q 'eventify'; then
              pm2 restart eventify  # Restart if already running
            else
              pm2 start npm --name "eventify" -- start  # Start if not running
            fi

            # Save the PM2 process list to make it persist across reboots
            pm2 save
          EOF

      # Step 5: Restart Nginx (if needed)
      - name: Restart Nginx
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@13.232.47.245 << 'EOF'
            # Restart Nginx if there are any configuration changes
            sudo systemctl restart nginx
          EOF
