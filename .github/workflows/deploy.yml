name: Deploy to EC2 on Push

on:
  push:
    branches:
      - main # Trigger this workflow on push to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the Repository
      - name: Checkout Repository
        uses: actions/checkout@v2

      # Step 2: Set up SSH
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }} # Use your configured SSH key

      # Step 3: Deploy to EC2 Instance
      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@13.127.183.139 << 'EOF'
            # Navigate to your project directory
            cd /home/ubuntu/eventify

            # Pull the latest changes from the main branch
            git pull origin main

            # Install dependencies
            npm install

            # Build the project (if applicable)
            npm run build

            # Start or restart the application using PM2
            if pm2 list | grep -q 'eventify'; then
              pm2 restart eventify  # Restart if already running
            else
              pm2 start npm --name "eventify" -- start  # Start if not running
            fi

            # Save the PM2 process list to make it persist across reboots
            pm2 save
          EOF
